
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrschüler App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Fahrschüler</h1>
<div class="topbar">
<input id="search" placeholder="Name, Vorname, Telefon">
<button id="addBtn">+</button>
</div>
</header>

<div id="studentList"></div>

<div id="formModal" class="modal hidden">
<h2>Fahrschüler anlegen</h2>

<input id="name" placeholder="Name">
<input id="vorname" placeholder="Vorname">
<input id="anschrift" placeholder="Anschrift">
<input id="geburt" type="date">
<input id="telefon" placeholder="Telefonnummer">
<input id="vorbesitz" placeholder="Vorbesitz">

<label>Klasse</label>
<select id="klasse">
<option>B</option>
<option>BE</option>
<option>L</option>
</select>

<label>Sehhilfe</label>
<div class="row">
<label><input type="checkbox" id="sehJa"> Ja</label>
<label><input type="checkbox" id="sehNein"> Nein</label>
</div>

<label>Beginn Ausbildung</label>
<input id="beginn" type="date">

<label>Praktische Prüfung</label>
<input id="pruefung" type="date">

<div class="buttons">
<button id="saveStudent">Speichern</button>
<button id="cancel">Abbrechen</button>
</div>

</div>

<div id="profile" class="hidden">

<div class="tabs">
<button onclick="showTab('infos')">Infos</button>
<button onclick="showTab('diagramm')">Diagrammkarte</button>
<button onclick="showTab('status')">Ausbildungsstand</button>
</div>

<div id="infos" class="tab"></div>

<div id="diagramm" class="tab">

<div class="box">
<h3>Grundstufe</h3>
<div id="grund"></div>
</div>

<div class="box">
<h3>Aufbaustufe</h3>
<div id="aufbau"></div>
</div>

<div class="box">
<h3>Leistungsstufe</h3>
<div id="leistung"></div>
</div>

<div class="box">
<h3>Grundfahraufgaben</h3>
<div id="grundauf"></div>
</div>

<div class="box">
<h3>Besondere Ausbildungsfahrten</h3>

<div class="counter">
Überland <button onclick="change('ue',-1)">-</button>
<span id="ue"></span>
<button onclick="change('ue',1)">+</button>
</div>

<div class="counter">
Autobahn <button onclick="change('ab',-1)">-</button>
<span id="ab"></span>
<button onclick="change('ab',1)">+</button>
</div>

<div class="counter">
Nacht <button onclick="change('nacht',-1)">-</button>
<span id="nacht"></span>
<button onclick="change('nacht',1)">+</button>
</div>

</div>

</div>

<div id="status" class="tab"></div>

</div>

<script src="app.js"></script>

</body>
</html>
