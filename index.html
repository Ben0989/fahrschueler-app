<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fahrschüler App</title>

  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  
  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f2f2f2;
    }

    header{
      background:#1976d2;
      color:white;
      padding:15px;
      display:flex;
      justify-content:space-between;
    }

    button{
      padding:8px;
      border:none;
      border-radius:6px;
      background:#1976d2;
      color:white;
      cursor:pointer;
    }

    #addStudentBtn{
      width:50px;
      height:50px;
      font-size:26px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
    }
    
    #studentList div{
      background:white;
      padding:10px;
      margin:10px;
      border-radius:6px;
      cursor:pointer;
    }

    .panel{
      background:white;
      margin:10px;
      padding:15px;
      border-radius:8px;
    }

    .modal{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.5);
      display:none;
      justify-content:center;
      align-items:center;
    }

    .modalBox{
      background:white;
      padding:20px;
      border-radius:10px;
      width:300px;
    }

    /* =============================
       DIAGRAMM
    ============================= */

    #diagramContainer{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:15px;
      margin-top:15px;
    }

    .diagramBox{
      padding:12px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      font-size:14px;
    }

    .diagramBox h3{
      margin-top:0;
      font-size:15px;
    }

    .diagramBox label{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin:4px 0;
    }

    .diagramBox:nth-child(1){background:#ffe0b2;}
    .diagramBox:nth-child(2){background:#ffccbc;}
    .diagramBox:nth-child(3){background:#ffcdd2;}
    .diagramBox:nth-child(4){background:#fff9c4;}
    .diagramBox:nth-child(5){background:#e6ee9c;}
    .diagramBox:nth-child(6){background:#c5e1a5;}
    .diagramBox:nth-child(7){background:#b2dfdb;}
    .diagramBox:nth-child(8){background:#bbdefb;}
    .diagramBox:nth-child(9){background:#d1c4e9;}

    /* =============================
       AUSWERTUNG
    ============================= */

    #gesamtProgress{
      font-size:18px;
      font-weight:bold;
      margin-bottom:10px;
    }

    #ampel{
      font-size:40px;
      margin-bottom:10px;
    }

    #pruefungsreife{
      font-size:18px;
      font-weight:bold;
      margin-bottom:15px;
    }

    .progressBlock{
      margin:12px 0;
    }

    .progressTitle{
      font-weight:bold;
      margin-bottom:4px;
    }

    .progressBar{
      background:#ddd;
      border-radius:6px;
      overflow:hidden;
      height:18px;
    }

    .progressFill{
      height:100%;
      width:0%;
      transition:width 0.3s;
    }

    .green{ background:#4caf50; }
    .orange{ background:#ff9800; }
    .red{ background:#f44336; }

    /* =============================
       SONDERFAHRTEN
    ============================= */

    .driveRow{
      margin:8px 0;
      font-size:16px;
    }

    .driveRow button{
      margin:0 6px;
      width:30px;
    }

  </style>
</head>

<body>

<header>
  <h1>Fahrschüler</h1>
  <button id="addStudentBtn" type="button">+</button>
</header>

<div id="studentList"></div>

<!-- PANEL -->
<div id="studentPanel" class="panel" style="display:none;">

  <h2 id="panelName"></h2>

  <div class="tabs">
    <button onclick="showTab('info')">Infos</button>
    <button onclick="showTab('fahrten')">Fahrten</button>
    <button onclick="showTab('diagramm')">Diagramm</button>
    <button onclick="showTab('auswertung')">Auswertung</button>
  </div>

  <!-- INFOS -->
  <div id="info" class="tab">
    <p><b>Vorname:</b> <span id="panelVorname"></span></p>
    <p><b>Klasse:</b> <span id="panelKlasse"></span></p>
    <p><b>Telefon:</b> <span id="panelTelefon"></span></p>
    <p><b>Adresse:</b> <span id="panelAdresse"></span></p>
    <p><b>Vorbesitz:</b> <span id="panelVorbesitz"></span></p>
    <p><b>Start:</b> <span id="panelStart"></span></p>
    <p><b>Theorie:</b> <span id="panelTheorie"></span></p>
    <p><b>Praxis:</b> <span id="panelPraxis"></span></p>
  </div>

  <!-- FAHRTEN -->
  <div id="fahrten" class="tab" style="display:none;">
    <h3>Fahrstunden</h3>

    <input id="fahrtTitel" placeholder="Titel">
    <textarea id="fahrtNotiz" placeholder="Notizen"></textarea>

    <button id="addFahrtBtn" type="button">Fahrt speichern</button>
    <hr>

<h4>GPS Tracking</h4>

<button id="startTrackingBtn" type="button">Tracking starten</button>
<button id="stopTrackingBtn" type="button">Tracking stoppen</button>

<p>Strecke: <span id="distance">0</span> km</p>
<p>Dauer: <span id="duration">0</span> min</p>
<p>Geschwindigkeit: <span id="speed">0</span> km/h</p>
    <hr>
    

    <div id="fahrtenListe"></div>
  </div>

  <!-- DIAGRAMM -->
  <div id="diagramm" class="tab" style="display:none;">
    <div id="diagramContainer"></div>
  </div>

  <!-- AUSWERTUNG -->
  <div id="auswertung" class="tab" style="display:none;">

    <h3>Gesamtfortschritt</h3>

    <div id="gesamtProgress"></div>
    <div id="ampel"></div>
    <div id="pruefungsreife"></div>

    <hr>

    <h3>Fortschritt nach Bereichen</h3>

    <div id="progressContainer"></div>

    <hr>

    <h3>Besondere Ausbildungsfahrten</h3>

    <div class="driveRow">
      Überland:
      <button onclick="changeDrive('ul', -1)">-</button>
      <span id="ulCount">0</span>
      <span id="ulMax"></span>
      <button onclick="changeDrive('ul', 1)">+</button>
    </div>

    <div class="driveRow">
      Autobahn:
      <button onclick="changeDrive('ab', -1)">-</button>
      <span id="abCount">0</span>
      <span id="abMax"></span>
      <button onclick="changeDrive('ab', 1)">+</button>
    </div>

    <div class="driveRow">
      Nacht:
      <button onclick="changeDrive('na', -1)">-</button>
      <span id="naCount">0</span>
      <span id="naMax"></span>
      <button onclick="changeDrive('na', 1)">+</button>
    </div>

  </div>

  <hr>

  <button id="editBtn" type="button">Bearbeiten</button>
  <button id="deleteBtn" type="button">Löschen</button>
  <button id="closePanelBtn" type="button">Schließen</button>

</div>

<!-- MODAL -->
<div id="studentModal" class="modal">
  <div class="modalBox">

    <h2>Neuer Schüler</h2>

    <input id="name" placeholder="Name"><br><br>
    <input id="vorname" placeholder="Vorname"><br><br>

    <select id="klasse">
      <option>B</option>
      <option>BE</option>
      <option>L</option>
    </select><br><br>

    <input id="telefon" placeholder="Telefon"><br><br>
    <input id="adresse" placeholder="Adresse"><br><br>
    <input id="vorbesitz" placeholder="Vorbesitz"><br><br>

    <label>Start Ausbildung</label><br>
    <input id="startAusbildung" type="date"><br><br>

    <label>Theorieprüfung</label><br>
    <input id="pruefungTheorie" type="date"><br><br>

    <label>Praxisprüfung</label><br>
    <input id="pruefungPraxis" type="date"><br><br>
    
    <button id="saveBtn" type="button">Speichern</button>
    <button id="closeBtn" type="button">Abbrechen</button>

  </div>
</div>

<script src="js/diagrammData.js"></script>
<script src="js/app.js"></script>

</body>
</html>
