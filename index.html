<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fahrschüler App</title>

<link rel="stylesheet" href="style.css">

<!-- Leaflet Karte -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<header>

<h1>Fahrschüler</h1>

<button onclick="openAdd()">+</button>

</header>

<input id="search" placeholder="Fahrschüler suchen">

<div id="studentList"></div>

<!-- =============================
     SCHÜLER PANEL
============================= -->

<div id="studentPanel" class="hidden panel">

<h2 id="studentTitle"></h2>

<div class="tabs">

<button onclick="showTab('info')">Infos</button>
<button onclick="showTab('diagramm')">Diagrammkarte</button>
<button onclick="showTab('fahrten')">Fahrt erfassen</button>
<button onclick="showTab('status')">Ausbildungsstand</button>

</div>

<!-- =============================
     INFO TAB
============================= -->

<div id="info" class="tab"></div>

<!-- =============================
     DIAGRAMMKARTE
============================= -->

<div id="diagramm" class="tab hidden">

<div id="diagramContainer"></div>

</div>

<!-- =============================
     FAHRT ERFASSEN
============================= -->

<div id="fahrten" class="tab hidden">

<h3>Neue Fahrstunde</h3>

<input id="fahrtTitel" placeholder="Titel der Fahrstunde">

<textarea id="fahrtNotiz" placeholder="Notizen zur Fahrstunde"></textarea>

<br><br>

<button onclick="startTracking()">GPS Start</button>
<button onclick="stopTracking()">GPS Stop</button>

<button onclick="saveFahrt()">Fahrt speichern</button>

</div>

<!-- =============================
     AUSBILDUNGSSTAND
============================= -->

<div id="status" class="tab hidden">

<h3>Gesamtfortschritt</h3>

<div id="gesamtProgress"></div>
<div id="ausbildungsAmpel"></div>
<div id="pruefungsreifeStatus"></div>

<hr>

<h3>Ausbildungsfortschritt</h3>

<div id="progressContainer"></div>

<hr>

<h3>Besondere Ausbildungsfahrten</h3>

<div class="fahrt">

Überland

<button onclick="changeDrive('ul',-1)">-</button>

<span id="ueberlandCount">0</span>

<button onclick="changeDrive('ul',1)">+</button>

</div>

<div class="fahrt">

Autobahn

<button onclick="changeDrive('ab',-1)">-</button>

<span id="autobahnCount">0</span>

<button onclick="changeDrive('ab',1)">+</button>

</div>

<div class="fahrt">

Nacht

<button onclick="changeDrive('na',-1)">-</button>

<span id="nachtCount">0</span>

<button onclick="changeDrive('na',1)">+</button>

</div>

<hr>

<h3>Fahrtenübersicht</h3>

<div id="fahrtenListe"></div>

</div>

</div>

<!-- =============================
     FAHRSCHÜLER ANLEGEN
============================= -->

<div id="addPanel" class="hidden panel">

<h2>Fahrschüler anlegen</h2>

<input id="name" placeholder="Name">

<input id="vorname" placeholder="Vorname">

<select id="klasse">

<option>B</option>
<option>BE</option>
<option>L</option>

</select>

<input id="telefon" placeholder="Telefon">

<input id="adresse" placeholder="Adresse">

<input id="vorbesitz" placeholder="Vorbesitz">

<label>Start Ausbildung</label>

<input id="startAusbildung" type="date">

<label>Theorieprüfung</label>

<input id="pruefungTheorie" type="date">

<label>Praxisprüfung</label>

<input id="pruefungPraxis" type="date">

<div class="buttons">

<button onclick="saveStudent()">Speichern</button>
<button onclick="closeAdd()">Abbrechen</button>

</div>

</div>

<!-- =============================
     SCRIPTS
============================= -->

<script src="js/diagrammData.js"></script>
<script src="js/app.js"></script>

</body>

</html>
