
<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fahrschüler App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Fahrschüler</h1>
<button onclick="openAdd()">+</button>
</header>

<input id="search" placeholder="Fahrschüler suchen">

<div id="studentList"></div>

<div id="studentPanel" class="hidden panel">

<h2 id="studentTitle"></h2>

<div class="tabs">
<button onclick="showTab('info')">Infos</button>
<button onclick="showTab('fahrten')">Fahrt</button>
<button onclick="showTab('status')">Ausbildungsstand</button>
</div>

<div id="info" class="tab"></div>

<div id="fahrten" class="tab hidden">
<h3>Neue Fahrstunde</h3>
<input id="fahrtTitel" placeholder="Titel">
<textarea id="fahrtNotiz" placeholder="Notiz"></textarea>
<button onclick="saveFahrt()">Fahrt speichern</button>
</div>

<div id="status" class="tab hidden">

<h3>Sonderfahrten</h3>

Überland
<button onclick="changeDrive('ul',-1)">-</button>
<span id="ueberlandCount">0</span>
<button onclick="changeDrive('ul',1)">+</button>

<br><br>

Autobahn
<button onclick="changeDrive('ab',-1)">-</button>
<span id="autobahnCount">0</span>
<button onclick="changeDrive('ab',1)">+</button>

<br><br>

Nacht
<button onclick="changeDrive('na',-1)">-</button>
<span id="nachtCount">0</span>
<button onclick="changeDrive('na',1)">+</button>

</div>

</div>


<div id="addPanel" class="hidden panel">

<h2>Fahrschüler</h2>

<input id="name" placeholder="Name">
<input id="vorname" placeholder="Vorname">

<select id="klasse">
<option>B</option>
<option>BE</option>
<option>L</option>
</select>

<input id="telefon" placeholder="Telefon">
<input id="adresse" placeholder="Adresse">
<input id="vorbesitz" placeholder="Vorbesitz">

<label>Start Ausbildung</label>
<input id="startAusbildung" type="date">

<label>Prüfung Theorie</label>
<input id="pruefungTheorie" type="date">

<label>Prüfung Praxis</label>
<input id="pruefungPraxis" type="date">

<br><br>

<button onclick="saveStudent()">Speichern</button>
<button onclick="closeAdd()">Abbrechen</button>

</div>

<script src="js/app.js"></script>
<script src="js/students.js"></script>
<script src="js/sonderfahrten.js"></script>
<script src="js/fahrten.js"></script>
<script src="js/backup.js"></script>

</body>
</html>
