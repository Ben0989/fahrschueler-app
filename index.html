<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fahrschüler App</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f2f2f2;
    }

    header{
      background:#1976d2;
      color:white;
      padding:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    button{
      padding:8px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    /* MODAL */
    .modal{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.5);

      display:none;

      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .modalBox{
      background:white;
      padding:20px;
      border-radius:10px;
      width:300px;
    }
  </style>
</head>

<body>

<header>
  <h1>Fahrschüler</h1>
  <button id="addStudentBtn">+</button>
</header>

<!-- MODAL -->
<div id="studentModal" class="modal">
  <div class="modalBox">
    <h2>Neuer Schüler</h2>

    <input id="name" placeholder="Name"><br><br>
    <input id="vorname" placeholder="Vorname"><br><br>

    <button id="saveBtn">Speichern</button>
    <button id="closeBtn">Abbrechen</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
