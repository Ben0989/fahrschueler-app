<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fahrschüler App</title>
  <link rel="stylesheet" href="style.css">
  
</head>

<body>

<header>
  <h1>Fahrschüler</h1>
  <button id="addStudentBtn" type="button">+</button>
</header>

<div id="studentList"></div>

<!-- PANEL -->
<div id="studentPanel" class="panel" style="display:none;">

  <h2 id="panelName"></h2>

  <p><b>Vorname:</b> <span id="panelVorname"></span></p>
  <p><b>Klasse:</b> <span id="panelKlasse"></span></p>
  <p><b>Telefon:</b> <span id="panelTelefon"></span></p>
  <p><b>Adresse:</b> <span id="panelAdresse"></span></p>
  <p><b>Vorbesitz:</b> <span id="panelVorbesitz"></span></p>
  <p><b>Start:</b> <span id="panelStart"></span></p>
  <p><b>Theorie:</b> <span id="panelTheorie"></span></p>
  <p><b>Praxis:</b> <span id="panelPraxis"></span></p>
  <button id="closePanelBtn">Schließen</button>

</div>

<!-- MODAL -->
<div id="studentModal" class="modal">
  <div class="modalBox">

    <h2>Neuer Schüler</h2>

    <input id="name" placeholder="Name"><br><br>
    <input id="vorname" placeholder="Vorname"><br><br>
    <select id="klasse">
      <option>B</option>
      <option>BE</option>
      <option>L</option>
    </select><br><br>

    <input id="telefon" placeholder="Telefon"><br><br>
    <input id="adresse" placeholder="Adresse"><br><br>
    <input id="vorbesitz" placeholder="Vorbesitz"><br><br>
    <label>Start Ausbildung</label><br>
    <input id="startAusbildung" type="date"><br><br>
    <label>Theorieprüfung</label><br>
    <input id="pruefungTheorie" type="date"><br><br>
    <label>Praxisprüfung</label><br>
    <input id="pruefungPraxis" type="date"><br><br>
    
    
    <button id="saveBtn" type="button">Speichern</button>
    <button id="closeBtn" type="button">Abbrechen</button>

  </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
