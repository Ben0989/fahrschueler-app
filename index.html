<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fahrschüler App</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <h1>Fahrschüler</h1>
  <button id="addStudentBtn">+</button>
</header>

<!-- LISTE -->
<div id="studentList"></div>

<!-- PANEL -->
<div id="studentPanel" style="display:none; padding:15px;">

  <h2 id="panelName"></h2>

  <p><b>Vorname:</b> <span id="panelVorname"></span></p>
  <p><b>Klasse:</b> <span id="panelKlasse"></span></p>

  <hr>

  <!-- ===================== -->
  <!-- FAHRTEN -->
  <!-- ===================== -->

  <h3>Fahrstunden</h3>

  <input id="fahrtTitel" placeholder="Titel (z. B. Einparken)">
  <textarea id="fahrtNotiz" placeholder="Notizen"></textarea>

  <button id="addFahrtBtn" type="button">Fahrt speichern</button>

  <div id="fahrtenListe"></div>

  <hr>

  <button id="editBtn" type="button">Bearbeiten</button>
  <button id="deleteBtn" type="button">Löschen</button>
  <button id="closePanelBtn" type="button">Schließen</button>

</div>

<!-- MODAL -->
<div id="studentModal" class="modal">
  <div class="modalBox">

    <h2>Fahrschüler anlegen</h2>

    <input id="name" placeholder="Name">
    <input id="vorname" placeholder="Vorname">

    <select id="klasse">
      <option>B</option>
      <option>BE</option>
      <option>L</option>
    </select>

    <input id="telefon" placeholder="Telefon">
    <input id="adresse" placeholder="Adresse">
    <input id="vorbesitz" placeholder="Vorbesitz">

    <label>Start Ausbildung</label>
    <input id="startAusbildung" type="date">

    <label>Theorieprüfung</label>
    <input id="pruefungTheorie" type="date">

    <label>Praxisprüfung</label>
    <input id="pruefungPraxis" type="date">

    <button id="saveBtn" type="button">Speichern</button>
    <button id="closeBtn" type="button">Abbrechen</button>

  </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
