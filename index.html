<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fahrschüler App</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f2f2f2;
    }

    header{
      background:#1976d2;
      color:white;
      padding:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    button{
      padding:8px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    /* MODAL */
    .modal{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.5);

      display:none;

      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .modalBox{
      background:white;
      padding:20px;
      border-radius:10px;
      width:300px;
    }
  </style>
</head>

<body>

<header>
  <h1>Fahrschüler</h1>
  <button id="addStudentBtn">+</button>
</header>

<!-- MODAL -->
<div id="studentModal" class="modal">
  <div class="modalBox">

    <h2>Fahrschüler anlegen</h2>

    <input id="name" placeholder="Name">
    <input id="vorname" placeholder="Vorname">

    <select id="klasse">
      <option>B</option>
      <option>BE</option>
      <option>L</option>
    </select>

    <input id="telefon" placeholder="Telefon">
    <input id="adresse" placeholder="Adresse">
    <input id="vorbesitz" placeholder="Vorbesitz">

    <label>Start Ausbildung</label>
    <input id="startAusbildung" type="date">

    <label>Theorieprüfung</label>
    <input id="pruefungTheorie" type="date">

    <label>Praxisprüfung</label>
    <input id="pruefungPraxis" type="date">

    <br>

    <button id="saveBtn" type="button">Speichern</button>
    <button id="closeBtn" type="button">Abbrechen</button>

  </div>
</div>
<div id="studentPanel" style="display:none; padding:15px;">

  <h2 id="panelName"></h2>

  <p><b>Vorname:</b> <span id="panelVorname"></span></p>
  <p><b>Klasse:</b> <span id="panelKlasse"></span></p>
  <p><b>Telefon:</b> <span id="panelTelefon"></span></p>
  <p><b>Adresse:</b> <span id="panelAdresse"></span></p>
  <p><b>Vorbesitz:</b> <span id="panelVorbesitz"></span></p>

  <p><b>Start:</b> <span id="panelStart"></span></p>
  <p><b>Theorie:</b> <span id="panelTheorie"></span></p>
  <p><b>Praxis:</b> <span id="panelPraxis"></span></p>

  <button id="closePanelBtn">Schließen</button>

</div>
<!-- Liste -->
<div id="studentList"></div>

  
<script src="js/app.js"></script>

</body>
</html>
