<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fahrschüler Ausbildung</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Fahrschüler</h1>
<button id="addBtn">+</button>
</header>

<div class="searchContainer">
<span class="searchIcon">🔍</span>
<input 
type="text" 
id="searchBox" 
placeholder="Name, Vorname, Telefon oder Klasse suchen..."
/>
</div>

<ul id="studentList"></ul>

<div id="modal" class="modal hidden">
<h2>Fahrschüler anlegen</h2>

<input id="name" placeholder="Name">
<input id="vorname" placeholder="Vorname">
<input id="anschrift" placeholder="Anschrift">
<input id="telefon" placeholder="Telefon">

<label>Klasse</label>
<select id="klasse">
<option>B</option>
<option>BE</option>
<option>L</option>
</select>

<label>Sehhilfe</label>
<select id="sehhilfe">
<option>Nein</option>
<option>Ja</option>
</select>

<label>Beginn Fahrausbildung</label>
<input type="date" id="beginn">

<label>Termin praktische Prüfung</label>
<input type="date" id="pruefung">

<div class="buttons">
<button id="saveBtn">Speichern</button>
<button id="cancelBtn">Abbrechen</button>
</div>
</div>

<script src="app.js"></script>

</body>
</html>
