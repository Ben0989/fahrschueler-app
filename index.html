<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fahrschüler App</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f2f2f2;
    }

    header{
      background:#1976d2;
      color:white;
      padding:15px;
      display:flex;
      justify-content:space-between;
    }

    button{
      padding:8px;
      border:none;
      border-radius:6px;
      background:#1976d2;
      color:white;
      cursor:pointer;
    }

    #studentList div{
      background:white;
      padding:10px;
      margin:10px;
      border-radius:6px;
      cursor:pointer;
    }

    .panel{
      background:white;
      margin:10px;
      padding:15px;
      border-radius:8px;
    }

    .modal{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.5);
      display:none;
      justify-content:center;
      align-items:center;
    }

    .modalBox{
      background:white;
      padding:20px;
      border-radius:10px;
      width:300px;
    }
  </style>
</head>

<body>

<header>
  <h1>Fahrschüler</h1>
  <button id="addStudentBtn" type="button">+</button>
</header>

<div id="studentList"></div>

<!-- PANEL -->
<div id="studentPanel" class="panel" style="display:none;">

  <h2 id="panelName"></h2>

  <p><b>Vorname:</b> <span id="panelVorname"></span></p>

  <button id="closePanelBtn">Schließen</button>

</div>

<!-- MODAL -->
<div id="studentModal" class="modal">
  <div class="modalBox">

    <h2>Neuer Schüler</h2>

    <input id="name" placeholder="Name"><br><br>
    <input id="vorname" placeholder="Vorname"><br><br>

    <button id="saveBtn" type="button">Speichern</button>
    <button id="closeBtn" type="button">Abbrechen</button>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
