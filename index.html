<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fahrschüler App</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<header>

<h1>Fahrschüler</h1>

<button id="addStudentBtn">+</button>

<button onclick="exportBackup()">Backup</button>

</header>

<input id="search" placeholder="Fahrschüler suchen">

<div id="studentList"></div>



<div id="studentPanel" class="hidden panel">

<h2 id="studentTitle"></h2>

<div class="tabs">

<button onclick="showTab('info')">Infos</button>
<button onclick="showTab('diagramm')">Diagrammkarte</button>
<button onclick="showTab('fahrten')">Fahrt erfassen</button>
<button onclick="showTab('status')">Ausbildungsstand</button>

</div>



<div id="info" class="tab"></div>



<div id="diagramm" class="tab hidden">

<div id="diagramContainer"></div>

</div>



<div id="fahrten" class="tab hidden">

<h3>Neue Fahrstunde</h3>

<input id="fahrtTitel" placeholder="Titel der Fahrstunde">

<textarea id="fahrtNotiz" placeholder="Notizen"></textarea>

<br>

<button onclick="startTracking()">GPS Start</button>
<button onclick="stopTracking()">GPS Stop</button>

<button onclick="saveFahrt()">Fahrt speichern</button>

</div>



<div id="status" class="tab hidden">

<h3>Ausbildungsstand</h3>

<div id="progress"></div>

<h3>Besondere Ausbildungsfahrten</h3>

<div class="fahrt">

Überland
<button onclick="changeDrive('ul',-1)">-</button>
<span id="ueberlandCount">0</span>
<button onclick="changeDrive('ul',1)">+</button>
/ <span id="ueberlandMax"></span>

</div>

<div class="fahrt">

Autobahn
<button onclick="changeDrive('ab',-1)">-</button>
<span id="autobahnCount">0</span>
<button onclick="changeDrive('ab',1)">+</button>
/ <span id="autobahnMax"></span>

</div>

<div class="fahrt">

Nacht
<button onclick="changeDrive('na',-1)">-</button>
<span id="nachtCount">0</span>
<button onclick="changeDrive('na',1)">+</button>
/ <span id="nachtMax"></span>

</div>

<h3 id="pruefungsreife"></h3>

<hr>

<h3>Fahrtenübersicht</h3>

<div id="fahrtenListe"></div>

<hr>

<h3>Statistik</h3>

<div id="stats"></div>

<hr>

<h3>Karte</h3>

<div id="map" style="height:300px;"></div>

<br>

<button onclick="exportPDF()">PDF Export</button>

</div>


</div>



<div id="addPanel" class="hidden panel">

<h2>Fahrschüler anlegen</h2>

<input id="name" placeholder="Name">
<input id="vorname" placeholder="Vorname">
<input id="anschrift" placeholder="Anschrift">

<input id="geburt" type="date">

<input id="telefon" placeholder="Telefon">

<input id="vorbesitz" placeholder="Vorbesitz">

<select id="klasse">

<option>B</option>
<option>BE</option>
<option>L</option>

</select>

<label>Sehhilfe</label>

<label>Ja <input type="checkbox" id="sehJa"></label>
<label>Nein <input type="checkbox" id="sehNein"></label>

<label>Beginn Fahrausbildung</label>

<input id="beginn" type="date">

<label>Termin Prüfung</label>

<input id="pruefung" type="date">

<div class="buttons">

<button onclick="saveStudent()">Speichern</button>
<button onclick="closeAdd()">Abbrechen</button>

</div>

</div>



<script src="diagrammData.js"></script>
<script src="app.js"></script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</body>
</html>
